<?xml version="1.0" encoding="UTF-8"?>
<!--
  BRI cover banner — used as the README hero image and the GitHub social preview.
  Aspect ratio: 1280x320 (4:1) for high-DPI legibility on GitHub.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1280 320"
     role="img"
     aria-labelledby="bri-cover-title">
  <title id="bri-cover-title">BRI — conversational video intelligence</title>

  <defs>
    <linearGradient id="cover-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0a0a"/>
      <stop offset="55%"  stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cover-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF69B4"/>
      <stop offset="50%"  stop-color="#BA68C8"/>
      <stop offset="100%" stop-color="#40E0D0"/>
    </linearGradient>
    <pattern id="cover-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#222222" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background. -->
  <rect width="1280" height="320" fill="url(#cover-bg)"/>
  <rect width="1280" height="320" fill="url(#cover-grid)" opacity="0.5"/>

  <!-- Brand mark. -->
  <g transform="translate(60,80)">
    <rect x="0" y="0" width="160" height="160" rx="32" ry="32" fill="#0a0a0a" stroke="url(#cover-accent)" stroke-width="3"/>
    <g fill="none" stroke="url(#cover-accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <line x1="50" y1="40" x2="50" y2="120"/>
      <path d="M50 40 H86 a20 20 0 0 1 0 40 H50"/>
      <path d="M50 80 H90 a20 20 0 0 1 0 40 H50"/>
    </g>
    <polygon points="108,94 130,110 108,126" fill="#40E0D0"/>
  </g>

  <!-- Wordmark + tagline. -->
  <g transform="translate(260,0)" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="0" y="160" font-size="96" font-weight="700" letter-spacing="-2">BRI</text>
    <text x="0" y="210" font-size="28" font-weight="500" fill="#a0a0a0">Empathetic video intelligence</text>
    <text x="0" y="245" font-size="18" font-weight="400" fill="#666666">Streamlit UI · FastAPI MCP · SQLite · optional multimodal ML tools</text>
  </g>

  <!-- Right-side accent stripe. -->
  <rect x="1100" y="40" width="6" height="240" fill="url(#cover-accent)" rx="3"/>
</svg>