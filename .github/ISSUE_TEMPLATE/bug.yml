name: Bug report
description: Report a defect in BRI so maintainers can reproduce and fix it.
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in every
        section below; missing information slows down the fix.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A one-paragraph description of the bug.
      placeholder: |
        BRI crashes when I upload a 4K MP4 longer than 5 minutes.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal commands or actions that produce the bug.
      placeholder: |
        1. `docker compose up --build`
        2. Open http://localhost:8501
        3. Upload `sample.mp4`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
      validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and stack trace
      description: Paste the relevant output from `docker compose logs` or the Streamlit UI.
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      description: |
        OS, Python version, Docker version, GPU/CPU, BRI commit SHA.

  - type: input
    id: config
    attributes:
      label: Relevant config
      description: |
        Which env vars are non-default (omit the values).

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How broken is this for you?
      options:
        - "Critical: data loss or security"
        - "High: blocks my workflow"
        - "Medium: workaround exists"
        - "Low: cosmetic or rare"
      default: "Medium"

  - type: checkboxes
    id: checklist
    attributes:
      label: Self-check
      options:
        - label: I searched the issue tracker for an existing report.
        - label: I can reproduce on the latest `master`.
        - label: I am running a supported version (see SECURITY.md).