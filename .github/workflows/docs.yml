# .github/workflows/docs.yml
# Docs hygiene: markdownlint, broken-link check, mkdocs preview build.
# Runs on PRs that touch docs/, README, mkdocs config, or palette.

name: docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "README.md"
      - "AUDIT.md"
      - "FINAL_REPORT.md"
      - "mkdocs.yml"
      - "markdownlint.json"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "AUDIT.md"
      - "FINAL_REPORT.md"
      - "mkdocs.yml"
      - "markdownlint.json"

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
          config: markdownlint.json
          ignore: |
            docs/archive/**
            docs/root-history/**

  link-check:
    name: link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --exclude-loopback --exclude-mail --exclude 'docs/archive/**' README.md docs/ AUDIT.md
          fail: true

  mkdocs-build:
    name: mkdocs build (preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mkdocs + material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocstrings[python] pymdown-extensions

      - name: Build site
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build --strict
          else
            echo "mkdocs.yml not present; skipping build (added in Phase 4d)."
          fi