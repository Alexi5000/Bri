# .github/workflows/ci.yml
# Primary CI gate. Runs on every push to master and every PR.
# Matrix: ubuntu + windows × Python 3.11 + 3.12.
# Lint → type-check → test (with coverage gate) → compose validation → image build.

name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-type:
    name: lint + type (${{ matrix.os }} py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install types-requests types-redis

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: |
          mypy --version
          mypy mcp_server services tools storage ui models config app

  test:
    name: test + coverage (${{ matrix.os }} py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-cov

      - name: Run pytest with coverage gate
        env:
          APP_ENV: test
          ALLOW_MISSING_GROQ_FOR_TESTS: "true"
        run: |
          pytest tests/ \
            --cov=mcp_server --cov=services --cov=tools --cov=storage \
            --cov=ui --cov=models --cov=config --cov=app \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=40

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate compose file
        run: docker compose config --quiet

  compose-build:
    name: docker compose build (linux only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build MCP image
        run: docker build -f Dockerfile.mcp -t bri-mcp:ci .

      - name: Build UI image
        run: docker build -f Dockerfile.ui -t bri-ui:ci .

  required:
    name: required checks
    needs: [lint-and-type, test, compose-validate, compose-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs passed."