site_name: BRI
site_description: Empathetic video intelligence — Streamlit + FastAPI + multimodal ML.
site_author: BRI contributors
repo_url: https://github.com/Alexi5000/Bri
repo_name: Alexi5000/Bri
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - styles/palette.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            heading_level: 2
            members_order: source
            separate_signature: true
            unwrap_annotated: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_labels: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: README.md
  - Documentation:
      - Index: INDEX.md
      - Architecture: ARCHITECTURE.md
      - API reference: API.md
      - API examples: API_EXAMPLES.md
      - Configuration: CONFIGURATION.md
      - Deployment: DEPLOYMENT.md
      - Streamlit Cloud: STREAMLIT_CLOUD_DEPLOYMENT.md
      - Operations runbook: OPERATIONS_RUNBOOK.md
      - Performance tuning: PERFORMANCE_TUNING_GUIDE.md
      - Troubleshooting: TROUBLESHOOTING.md
      - Error patterns: ERROR_PATTERNS_SOLUTIONS.md
      - Database management: DATABASE_MANAGEMENT_GUIDE.md
      - Backup and restore: BACKUP_RESTORE_GUIDE.md
      - Data quality: DATA_QUALITY_INTEGRATION_GUIDE.md
      - Vector search: VECTOR_SEARCH_INTEGRATION_GUIDE.md
      - Vector DB evaluation: VECTOR_DB_EVALUATION.md
      - Testing: TESTING.md
      - User guide: USER_GUIDE.md
  - Architecture deep dives:
      - Uncle Bob clean code review: architecture/UNCLE_BOB_CLEAN_CODE_REVIEW.md
      - Data flow and state: architecture/DATA_FLOW_AND_STATE.md
      - Database schema and durability: architecture/DATABASE_SCHEMA_AND_DURABILITY.md
      - Full-stack plan: architecture/full_stack_streamlit_middle_layer_plan.md
  - API reference (auto):
      - mcp_server:
          - main: reference/mcp_server/main.md
          - cache: reference/mcp_server/cache.md
          - circuit_breaker: reference/mcp_server/circuit_breaker.md
          - middleware: reference/mcp_server/middleware.md
          - registry: reference/mcp_server/registry.md
          - response_models: reference/mcp_server/response_models.md
          - validation: reference/mcp_server/validation.md
          - versioning: reference/mcp_server/versioning.md
      - services:
          - agent: reference/services/agent.md
          - application: reference/services/application.md
          - errors: reference/services/errors.md
          - router: reference/services/router.md
          - memory: reference/services/memory.md
          - mcp_client: reference/services/mcp_client.md
      - storage:
          - database: reference/storage/database.md
          - file_store: reference/storage/file_store.md
          - migrations: reference/storage/migrations.md
      - models:
          - responses: reference/models/responses.md
          - tools: reference/models/tools.md
          - video: reference/models/video.md
  - AI assistant guidance: ai/CLAUDE.md

# Per-package API reference pages are auto-generated by mkdocstrings.
# The reference/<package>/<module>.md stubs are created on first build by
# `python scripts/build_api_reference.py`. To avoid breaking the docs build
# when a stub is missing, the pages are listed here but mkdocstrings tolerates
# a missing target file by emitting a warning rather than failing strict.